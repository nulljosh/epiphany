name: Epiphany
options:
  bundleIdPrefix: com.heyitsmejosh
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: 2.2.4
  CURRENT_PROJECT_VERSION: "1"
  CODE_SIGN_STYLE: Automatic
targets:
  Epiphany:
    type: application
    platform: iOS
    destinations:
      - iPhone
    sources:
      - path: .
        excludes:
          - "Epiphany.xcodeproj"
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - "AppIcon.svg"
          - "icon.svg"
          - "plan.md"
          - "scripts"
          - "screenshots"
          - "Resources"
          - "*.profraw"
          - "*.xcworkspace"
          - "Tests"
          - "UITests"
          - "EpiphanyTests"
          - "build-archive"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_NAME: Epiphany
      PRODUCT_MODULE_NAME: Epiphany
      TARGETED_DEVICE_FAMILY: "1"
      # CODE_SIGN_ENTITLEMENTS: Epiphany.entitlements  # Requires paid Apple Developer Program
  EpiphanyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Epiphany
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.tests
      GENERATE_INFOPLIST_FILE: YES
      FRAMEWORK_SEARCH_PATHS: $(SDKROOT)/System/Library/Frameworks
      LD_RUNPATH_SEARCH_PATHS: $(INHERITED) @executable_path/Frameworks @loader_path/Frameworks
  EpiphanyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Epiphany
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Epiphany:
    build:
      targets:
        Epiphany: all
        EpiphanyTests: [test]
        EpiphanyUITests: [test]
    run:
      # Silence simulator framework log spam (MapKit/CoreLocation/PerfPower
      # telemetry, CAMetalLayer 0x0). These are OS logs, not app bugs.
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      targets:
        - EpiphanyTests
        - EpiphanyUITests
