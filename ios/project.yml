name: Opticon
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "3.1.0"
  CURRENT_PROJECT_VERSION: "1"
  CODE_SIGN_STYLE: Automatic
targets:
  Opticon:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - Tests
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.opticon
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # CODE_SIGN_ENTITLEMENTS: Opticon.entitlements  # Requires paid Apple Developer Program
  OpticonTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Opticon
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.opticon.tests
      GENERATE_INFOPLIST_FILE: YES
