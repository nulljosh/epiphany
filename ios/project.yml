name: Epiphany
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.4.0"
  CURRENT_PROJECT_VERSION: "1"
  CODE_SIGN_STYLE: Automatic
targets:
  Epiphany:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - Tests
          - UITests
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_NAME: Epiphany
      PRODUCT_MODULE_NAME: Epiphany
      # CODE_SIGN_ENTITLEMENTS: Epiphany.entitlements  # Requires paid Apple Developer Program
  EpiphanyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Epiphany
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.tests
      GENERATE_INFOPLIST_FILE: YES
  EpiphanyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Epiphany
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.uitests
        GENERATE_INFOPLIST_FILE: YES
