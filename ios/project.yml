name: Epiphany
options:
  bundleIdPrefix: com.heyitsmejosh
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: 2.5.2
  CURRENT_PROJECT_VERSION: "7"
  CODE_SIGN_STYLE: Automatic
targets:
  Epiphany:
    type: application
    platform: iOS
    destinations:
      - iPhone
    sources:
      - path: .
        excludes:
          - "Epiphany.xcodeproj"
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - "AppIcon.svg"
          - "icon.svg"
          - "plan.md"
          - "scripts"
          - "screenshots"
          - "fastlane"
          - "Resources"
          - "*.profraw"
          - "*.xcworkspace"
          - "Tests"
          - "UITests"
          - "EpiphanyTests"
          - ".asc"
          - "build-archive"
          - "Info.plist"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_NAME: Epiphany
      PRODUCT_MODULE_NAME: Epiphany
      TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Epiphany.entitlements
    dependencies:
      - target: MonicaWidgetsExtension
  MonicaWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../widgets-ios
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - "*.md"
          - "*.svg"
    info:
      path: ../widgets-ios/Info.plist
      properties:
        CFBundleDisplayName: Epiphany Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      INFOPLIST_KEY_CFBundleDisplayName: Epiphany Widgets
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 Joshua Trommel"
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.widgets
      ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
      PRODUCT_NAME: MonicaWidgets
      CODE_SIGN_STYLE: Automatic
    entitlements:
      path: ../widgets-ios/EpiphanyWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.heyitsmejosh.epiphany
  EpiphanyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Epiphany
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.tests
      GENERATE_INFOPLIST_FILE: YES
      FRAMEWORK_SEARCH_PATHS: $(SDKROOT)/System/Library/Frameworks
      LD_RUNPATH_SEARCH_PATHS: $(INHERITED) @executable_path/Frameworks @loader_path/Frameworks
  EpiphanyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Epiphany
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Epiphany:
    build:
      targets:
        Epiphany: all
        EpiphanyTests: [test]
        EpiphanyUITests: [test]
    run:
      # Silence simulator framework log spam (MapKit/CoreLocation/PerfPower
      # telemetry, CAMetalLayer 0x0). These are OS logs, not app bugs.
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      targets:
        - EpiphanyTests
        - EpiphanyUITests
      # Forwards the shell's SNAPSHOT_EMAIL/SNAPSHOT_PASSWORD (see .env.accounts.local)
      # into the UI test runner process -- xcodebuild test does NOT pass through
      # arbitrary shell env by default, only vars declared here get resolved
      # against the invoking process's environment.
      environmentVariables:
        SNAPSHOT_EMAIL: $(SNAPSHOT_EMAIL)
        SNAPSHOT_PASSWORD: $(SNAPSHOT_PASSWORD)
