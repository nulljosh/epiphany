<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a1a" rx="32"/>
  <!-- Outer glass panel -->
  <rect x="28" y="32" width="144" height="136" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Inner glass panel -->
  <rect x="40" y="48" width="120" height="100" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="52" y1="72" x2="148" y2="72" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <line x1="52" y1="88" x2="148" y2="88" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <line x1="52" y1="104" x2="148" y2="104" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <line x1="52" y1="120" x2="148" y2="120" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <!-- Vertical grid -->
  <line x1="72" y1="56" x2="72" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <line x1="100" y1="56" x2="100" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <line x1="128" y1="56" x2="128" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <!-- Chart area fill -->
  <polygon points="52,130 68,118 82,122 100,96 116,82 132,88 148,62 148,136 52,136" fill="rgba(255,255,255,0.04)"/>
  <!-- Chart line -->
  <polyline points="52,130 68,118 82,122 100,96 116,82 132,88 148,62" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Key data points -->
  <circle cx="100" cy="96" r="2.5" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
  <circle cx="148" cy="62" r="3" fill="rgba(255,255,255,0.7)" stroke="rgba(255,255,255,0.9)" stroke-width="0.8"/>
  <!-- Dollar sign top left -->
  <text x="50" y="66" fill="rgba(255,255,255,0.2)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">$</text>
  <!-- Bottom status bar -->
  <rect x="42" y="152" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="64" y="152" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="86" y="152" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="108" y="152" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="130" y="152" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
</svg>