<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#f5f5f7" stroke="#d1d5db" stroke-width="1"/>
  <!-- Claw/gateway branches -->
  <line x1="100" y1="70" x2="60" y2="50" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="70" x2="100" y2="45" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="70" x2="140" y2="50" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <!-- Claw tips -->
  <circle cx="60" cy="50" r="5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="100" cy="45" r="5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="140" cy="50" r="5" fill="#f59e0b" opacity="0.5"/>
  <!-- Central hub -->
  <circle cx="100" cy="85" r="15" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
  <circle cx="100" cy="85" r="5" fill="#f59e0b" opacity="0.5"/>
  <!-- Output channels -->
  <line x1="100" y1="100" x2="65" y2="130" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="100" x2="100" y2="135" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="100" x2="135" y2="130" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <!-- Channel endpoints -->
  <rect x="50" y="130" width="30" height="18" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <rect x="85" y="135" width="30" height="18" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <rect x="120" y="130" width="30" height="18" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
</svg>
