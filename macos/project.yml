name: Epiphany
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    macOS: "14.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: 2.5.2
  CURRENT_PROJECT_VERSION: "202607211614"
targets:
  Epiphany:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "*.svg"
          - "*.md"
          - "*.app"
          - "*.pkg"
          - Tests
          - UITests-mac
          - fastlane
          - ".asc"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_ENTITLEMENTS: Epiphany.entitlements
      INFOPLIST_KEY_CFBundleDisplayName: Epiphany
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
    dependencies:
      - target: EpiphanyWidgets
  EpiphanyWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: ../widgets-macos
    settings:
      # ponytail: pre-existing WidgetKit completion-closure Sendable errors in
      # MarketsProvider/PortfolioProvider under Swift 6 mode, not touched by tonight's
      # bundle-ID merge. Pinned to Swift 5 language mode to unblock shipping; upgrade
      # path is annotating the TimelineProvider completion closures properly, then
      # bumping back to 6 to match the rest of the project.
      SWIFT_VERSION: "5.0"
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.widgets
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Epiphany Widgets
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_STYLE: Automatic
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: EpiphanyWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.heyitsmejosh.epiphany
  EpiphanyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Epiphany
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.tests
      GENERATE_INFOPLIST_FILE: YES
  EpiphanyMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests-mac
    dependencies:
      - target: Epiphany
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.epiphany.uitests
      GENERATE_INFOPLIST_FILE: YES
